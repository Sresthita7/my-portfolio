<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sresthita's Christmas Cottage Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background: #0a0a1a;
            display: flex; justify-content: center; align-items: center;
        }

        /* Animated Snowfall Background */
        #snow-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        /* The Main House Container */
        .house-scene {
            position: relative;
            width: 800px; /* Adjust according to your image aspect ratio */
            height: 600px;
            background-image: url('https://i.etsystatic.com/56071550/r/il/f3f3cf/6950288937/il_1140xN.6950288937_aqz4.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 20px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        /* Interactive Windows (Hotspots) */
        .hotspot {
            position: absolute;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .hotspot:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        /* Mid-Opening Window Effect Visual */
        .window-pane {
            position: absolute; width: 100%; height: 100%;
            display: flex; overflow: hidden; pointer-events: none;
        }

        .shutter {
            width: 50%; height: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(2px);
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* When opened, windows glow and shutters move */
        .opened .shutter-left { transform: perspective(1000px) rotateY(-110deg); transform-origin: left; opacity: 0; }
        .opened .shutter-right { transform: perspective(1000px) rotateY(110deg); transform-origin: right; opacity: 0; }
        .opened { background: radial-gradient(circle, rgba(255, 223, 100, 0.4) 0%, transparent 80%); }

        /* Positioning the Hotspots based on the Image */
        /* Tumi egulo ektu pixel adjust kore bosiye nio image-er janla onujayi */
        #edu-win { top: 31%; left: 45.5%; width: 9%; height: 13%; } /* Top small window */
        #exp-win { top: 56%; left: 59%; width: 15%; height: 18%; } /* Right window */
        #cert-door { top: 59%; left: 37.5%; width: 15%; height: 21%; border-radius: 50% 50% 0 0; } /* Door area */
        #award-win { top: 45%; left: 5%; width: 10%; height: 10%; opacity: 0; } /* Example for another hidden spot */

        /* Modal Styling */
        .modal-content {
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid #ffd700; color: #fff;
            border-radius: 20px; box-shadow: 0 0 40px rgba(0,0,0,1);
        }
        .modal-header { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal-title i { color: #ffd700; margin-right: 10px; }

    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div class="house-scene">
        <div id="edu-win" class="hotspot" onclick="openInfo('eduModal', this)">
            <div class="window-pane">
                <div class="shutter shutter-left"></div>
                <div class="shutter shutter-right"></div>
            </div>
        </div>

        <div id="exp-win" class="hotspot" onclick="openInfo('expModal', this)">
            <div class="window-pane">
                <div class="shutter shutter-left"></div>
                <div class="shutter shutter-right"></div>
            </div>
        </div>

        <div id="cert-door" class="hotspot" onclick="openInfo('certModal', this)"></div>
    </div>

    <div class="modal fade" id="eduModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-graduation-cap"></i> Education Details</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul>
                        <li><strong>MCA:</strong> SASTRA University, Tamilnadu [cite: 32]</li>
                        <li><strong>BCA:</strong> West Bengal University of Technology [cite: 31]</li>
                        <li><strong>PG Diploma (ML/AI):</strong> IIIT Bangalore [cite: 34]</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simple Snowfall Logic
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initSnow() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<100; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*3+1, d: Math.random()*1 });
        }

        function drawSnow() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.beginPath();
            particles.forEach(p => {
                ctx.moveTo(p.x, p.y);
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                p.y += p.d + 1;
                if(p.y > canvas.height) p.y = -10;
            });
            ctx.fill();
            requestAnimationFrame(drawSnow);
        }

        function openInfo(modalId, element) {
            element.classList.add('opened');
            const myModal = new bootstrap.Modal(document.getElementById(modalId));
            myModal.show();
            // Reset window after closing modal
            document.getElementById(modalId).addEventListener('hidden.bs.modal', () => {
                element.classList.remove('opened');
            });
        }

        initSnow(); drawSnow();
    </script>
</body>
</html>
